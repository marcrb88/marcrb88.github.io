<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<meta charset="UTF-8">

<style>
  .intro {
    max-width: 800px;
    margin: 20px auto;
    font-family: Arial, sans-serif;
    line-height: 1.6;
    color: #333;
    text-align: center;
  }
</style>

<style>
  #map {
    height: 600px;
    width: 80%;          /* 🔹 redueix amplada al 80% de la pàgina */
    margin: 0 auto;      /* 🔹 centra el mapa horitzontalment */
    border-radius: 8px;  /* opcional: cantonades arrodonides */
    box-shadow: 0 0 6px rgba(0,0,0,0.2); /* opcional: ombra suau */
  }
</style>

<div class="intro">
  <h1>Distribució de cultius de fruits secs al Baix Camp</h1>
  <p>
    Visualització interactiva de cultius de fruits secs del Baix Camp durant els periodes 2020-2024.
    Font: DUN
  </p>
</div>


<div id="controls"></div>
<div id="chart"></div>

<div id="chart-time-series" class="container mt-5">
  <h3>Evolució d'hectàrees per cultiu (2020-2024)</h3>
  <svg id="svg-time-series" width="900" height="400"></svg>
</div>

<div id="filters" class="container mt-4 mb-5">
  <div class="card shadow-sm p-3">
    <div class="row g-3 align-items-center justify-content-center">
      <div class="col-md-2">
        <label for="campanya" class="form-label fw-semibold">Campanya</label>
        <select id="campanya" class="form-select form-select-sm">
          <option value="">Totes</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="cultiu" class="form-label fw-semibold">Cultiu</label>
        <select id="cultiu" class="form-select form-select-sm">
          <option value="">Tots</option>
        </select>
      </div>

      <div class="col-md-2" id="varietat-container" style="display:none;">
        <label for="varietat" id="label-varietat" class="form-label fw-semibold">Varietat</label>
        <select id="varietat" class="form-select form-select-sm">
          <option value="">Totes</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="seca_regad" class="form-label fw-semibold">Tipus</label>
        <select id="seca_regad" class="form-select form-select-sm">
          <option value="">Tots</option>
          <option value="S">Secà</option>
          <option value="R">Regadiu</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="municipi" class="form-label fw-semibold">Municipi</label>
        <select id="municipi" class="form-select form-select-sm">
          <option value="">Tots</option>
        </select>
      </div>

      <div class="col-md-2">
        <label for="haMin" class="form-label fw-semibold">Hectarees min.</label>
        <input type="number" id="haMin" class="form-control form-control-sm" placeholder="0.01" step="0.001" min="0">
      </div>

      <div class="col-md-2">
        <label for="haMax" class="form-label fw-semibold">Hectarees max.</label>
        <input type="number" id="haMax" class="form-control form-control-sm" placeholder="10.00" step="0.001" min="0">
      </div>

      <div class="col-md-2 text-center">
        <button id="applyFilters" class="btn btn-success btn-sm mt-3 px-4">
          <i class="bi bi-funnel"></i> Aplica filtres
        </button>
      </div>
    </div>
  </div>
</div>

<div id="map" style="height: 600px;"></div>

<script>
  const map = L.map('map').setView([41.18, 1.05], 10)

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map)

  const colors = {
    "OLIVERA": "#4CAF50",
    "AVELLANER": "#8BC34A",
    "GARROFER": "#795548",
    "AMETLLER": "#FFC107",
    "NOGUERA": "#9E9E9E",
    "PISTATXER O FESTUC": "#FF5722"
  }

  const legend = L.control({ position: 'bottomright' })
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'info legend')
    div.innerHTML = '<b>Cultius</b><br>'
    for (const [cultiu, color] of Object.entries(colors)) {
      div.innerHTML +=
        `<i style="background:${color};width:12px;height:12px;display:inline-block;margin-right:4px;"></i>${cultiu}<br>`
    }
    return div
  }
  legend.addTo(map)


  let layer; // capa global per poder eliminar-la i tornar-la a pintar

fetch('data/parceles_simplificat_test.json')
  .then(r => r.json())
  .then(data => {

    const campanyes = [...new Set(data.features.map(f => f.properties.campanya))]
    .sort((a, b) => a - b)

    const selectCampanya = document.getElementById('campanya')
    campanyes.forEach(c => {
      const opt = document.createElement('option')
      opt.value = c
      opt.textContent = c
      selectCampanya.appendChild(opt)
    })

    console.log(campanyes)

    const cultius = [...new Set(data.features.map(f => f.properties.cultiu))]
      .filter(Boolean)
      .sort()

    const selectCultiu = document.getElementById('cultiu')
    cultius.forEach(c => {
      const opt = document.createElement('option')
      opt.value = c
      opt.textContent = c
      selectCultiu.appendChild(opt)
    })

    const municipis = [...new Set(data.features.map(f => f.properties.municipi))]
      .filter(Boolean)
      .sort()

    const selectMunicipi = document.getElementById('municipi')
    municipis.forEach(m => {
      const opt = document.createElement('option')
      opt.value = m
      opt.textContent = m
      selectMunicipi.appendChild(opt)
    })

    let allData = data; 

    layer = L.geoJSON(data, {
      style: f => {
        return {
          color: colors[f.properties.cultiu] || "#CCCCCC",
          weight: 0.3
        }
      },
      onEachFeature: (feature, layer) => {
        layer.bindPopup(`
          <b>Municipi:</b> ${feature.properties.municipi}<br>
          <b>Cultiu:</b> ${feature.properties.cultiu}<br>
          <b>Campanya:</b> ${feature.properties.campanya}<br>
          <b>Hectàrees:</b> ${feature.properties.ha }
        `)
      }
    }).addTo(map)

    // 🔹 Funció per aplicar filtres
    document.getElementById('applyFilters').addEventListener('click', () => {
      const campanya = document.getElementById('campanya').value
      const cultiu = document.getElementById('cultiu').value
      const secaRegad = document.getElementById('seca_regad').value
      const municipi = document.getElementById('municipi').value
      const varietat = document.getElementById('varietat').value
      const haMin = parseFloat(document.getElementById('haMin').value) || 0
      const haMax = parseFloat(document.getElementById('haMax').value) || Infinity



      if (layer) map.removeLayer(layer)

      const filtered = {
        ...data,
        features: data.features.filter(f => {
          const p = f.properties
          const haValue = parseFloat(p.ha.replace(',', '.')) || 0
          return (!campanya || p.campanya == campanya) &&
                (!cultiu || p.cultiu == cultiu) &&
                (!secaRegad || p.seca_Regad == secaRegad) &&
                (!municipi || p.municipi == municipi) &&
                (!varietat || p.varietat == varietat) &&
                (haValue >= haMin && haValue <= haMax)
      })
        
      }

      layer = L.geoJSON(filtered, {
        style: f => {
          return {
            color: colors[f.properties.cultiu] || "#CCCCCC",
            weight: 0.3
          }
        },
        onEachFeature: (feature, layer) => {
          layer.bindPopup(`
            <b>Municipi:</b> ${feature.properties.municipi}<br>
            <b>Cultiu:</b> ${feature.properties.cultiu}<br>
            <b>Campanya:</b> ${feature.properties.campanya}<br>
            <b>Hectàrees:</b> ${feature.properties.ha}
          `)
        }
      }).addTo(map)
    })

    document.getElementById('cultiu').addEventListener('change', () => {
    const cultiu = document.getElementById('cultiu').value
    const selectVarietat = document.getElementById('varietat')
    const labelVarietat = document.getElementById('label-varietat')

    // Si no hi ha cultiu → amaguem el filtre
    if (!cultiu) {
      selectVarietat.style.display = "none"
      labelVarietat.style.display = "none"
      selectVarietat.innerHTML = '<option value="">Totes</option>'
      return
    }

      const varietats = [...new Set(
        allData.features
          .filter(f => f.properties.cultiu === cultiu)
          .map(f => f.properties.varietat)
      )]
      .filter(Boolean)
      .sort()

      // 🔹 Mostrar el filtre
      selectVarietat.style.display = "inline-block"
      labelVarietat.style.display = "inline-block"

      // 🔹 Omplir el select
      selectVarietat.innerHTML = '<option value="">Totes</option>'
      varietats.forEach(v => {
        const opt = document.createElement('option')
        opt.value = v
        opt.textContent = v
        selectVarietat.appendChild(opt)
      })
    })

  })

  d3.csv("data/time_series_cultiu_chunked_fix.csv").then(data => {

    // Convertir valors numèrics
    data.forEach(d => {
      d.campanya = +d.campanya;
      d.ha = +d.ha;
    });

    // Agrupar per cultiu
    const nested = d3.group(data, d => d.cultiu);

    const svg = d3.select("#svg-time-series");
    const width = +svg.attr("width");
    const height = +svg.attr("height");
    const margin = { top: 40, right: 100, bottom: 40, left: 60 };

    const x = d3.scaleLinear()
      .domain(d3.extent(data, d => d.campanya))
      .range([margin.left, width - margin.right]);

    const y = d3.scaleLinear()
      .domain([0, d3.max(data, d => d.ha)])
      .nice()
      .range([height - margin.bottom, margin.top]);

    const color = d3.scaleOrdinal()
      .domain([...nested.keys()])
      .range(d3.schemeSet2);

    // Eixos
    svg.append("g")
    .attr("transform", `translate(0,${height - margin.bottom})`)
    .call(d3.axisBottom(x)
      .tickValues([2020, 2021, 2022, 2023, 2024])  // ✅ ticks fixos
      .tickFormat(d3.format("d"))
    );

    svg.append("g")
      .attr("transform", `translate(${margin.left},0)`)
      .call(d3.axisLeft(y));

    // Línies per cultiu
    nested.forEach((values, cultiu) => {
      // 🔹 Ordenar per campanya
      values.sort((a, b) => d3.ascending(a.campanya, b.campanya));

      svg.append("path")
        .datum(values)
        .attr("fill", "none")
        .attr("stroke", color(cultiu))
        .attr("stroke-width", 2)
        .attr("d", d3.line()
          .x(d => x(d.campanya))
          .y(d => y(d.ha))
        );

      const last = values[values.length - 1];
      svg.append("text")
        .attr("x", x(last.campanya) + 5)
        .attr("y", y(last.ha))
        .attr("fill", color(cultiu))
        .text(cultiu)
        .style("font-size", "12px");
    });


  });

  // Crear contenidors automàticament
  const controls = d3.select("#controls");

  const chartDiv = d3.select("#chart");

  // Dimensions
  const width = 1200;
  const height = 600;
  const margin = { top: 40, right: 20, bottom: 120, left: 80 };

  // SVG
  const svg = chartDiv.append("svg")
    .attr("width", width)
    .attr("height", height);


  const select = document.getElementById("campanya");

  // Carregar dades
  d3.csv("data/agg_campanya_municipi_cultiu_chunked_fix.csv").then(data => {
    // Convertir ha a número
    data.forEach(d => d.ha = +d.ha);

    data.forEach(d => {
      d.campanya = d.campanya.trim(); // ✅ elimina espais o tabulacions
      d.ha = +d.ha;
    });

    // Obtenir campanyes úniques
    const campanyes = [...new Set(data.map(d => d.campanya))].sort();

    const select = document.getElementById("campanya");  // ← AIXÒ FALTAVA

    select.innerHTML = "";  // ← ara sí funciona

    campanyes.forEach(c => {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      select.appendChild(opt);
    });


    // Funció per dibuixar el gràfic
    function update(campanya) {

      // Filtrar per campanya
      const filtered = data.filter(d => d.campanya === campanya);

      // Agrupar per municipi → cultiu → ha
      const nested = d3.group(filtered, d => d.municipi);

      // Preparar dades apilades
      const cultius = [...new Set(filtered.map(d => d.cultiu))].sort();

      const stackedData = d3.stack()
        .keys(cultius)
        .value(([, values], key) => {
          const found = values.find(v => v.cultiu === key);
          return found ? found.ha : 0;
        })(nested);

      // Escales
      const x = d3.scaleBand()
        .domain([...nested.keys()])
        .range([margin.left, width - margin.right])
        .padding(0.2);

      const y = d3.scaleLinear()
        .domain([0, d3.max(stackedData[stackedData.length - 1], d => d[1])])
        .nice()
        .range([height - margin.bottom, margin.top]);

      const color = d3.scaleOrdinal()
        .domain(cultius)
        .range(d3.schemeSet2);

      // Esborrar contingut anterior
      svg.selectAll("*").remove();

      // Dibuixar capes apilades
      svg.append("g")
        .selectAll("g")
        .data(stackedData)
        .join("g")
        .attr("fill", d => color(d.key))
        .selectAll("rect")
        .data(d => d)
        .join("rect")
        .attr("x", d => x(d.data[0]))
        .attr("y", d => y(d[1]))
        .attr("height", d => y(d[0]) - y(d[1]))
        .attr("width", x.bandwidth());

      // Eix X
      svg.append("g")
        .attr("transform", `translate(0,${height - margin.bottom})`)
        .call(d3.axisBottom(x))
        .selectAll("text")
        .attr("transform", "rotate(-65)")
        .style("text-anchor", "end");

      // Eix Y
      svg.append("g")
        .attr("transform", `translate(${margin.left},0)`)
        .call(d3.axisLeft(y));

      // Llegenda
      const legend = svg.append("g")
        .attr("transform", `translate(${width - 150}, ${margin.top})`);

      cultius.forEach((c, i) => {
        legend.append("rect")
          .attr("x", 0)
          .attr("y", i * 20)
          .attr("width", 12)
          .attr("height", 12)
          .attr("fill", color(c));

        legend.append("text")
          .attr("x", 20)
          .attr("y", i * 20 + 10)
          .text(c)
          .style("font-size", "12px");
      });
    }

    // Inicialitzar amb la primera campanya
    update(campanyes[0]);

    // Actualitzar quan l’usuari canvia la campanya
    select.addEventListener("change", e => update(e.target.value));
  });





</script>
