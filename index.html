<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div id="map" style="height: 600px;"></div>

<script>
  const map = L.map('map').setView([41.7, 1.5], 10)

  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map)

  // Paleta de colors per cultiu
  const colors = {
    'OLIVERA': '#4CAF50',
    'AVELLANER': '#8BC34A',
    'Vinya': '#CDDC39',
    'Cereal': '#FFC107',
    'Fruita dolca': '#FF9800',
    'Altres': '#9E9E9E'
  }

  // Llegenda
  const legend = L.control({ position: 'bottomright' })
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'info legend')
    div.innerHTML = '<b>Cultius</b><br>'
    for (const [cultiu, color] of Object.entries(colors)) {
      div.innerHTML +=
        `<i style="background:${color};width:12px;height:12px;display:inline-block;margin-right:4px;"></i>${cultiu}<br>`
    }
    return div
  }
  legend.addTo(map)

  // Carregar parcel·les
  fetch('parceles_simplificat.geojson')
    .then(r => r.json())
    .then(data => {
      L.geoJSON(data, {
        style: f => ({
          color: colors[f.properties.Cultiu] || colors['Altres'],
          weight: 0.3
        }),
        onEachFeature: (feature, layer) => {
          layer.bindPopup(`
            <b>Municipi:</b> ${feature.properties.Municipi}<br>
            <b>Cultiu:</b> ${feature.properties.Cultiu}<br>
            <b>Campanya:</b> ${feature.properties.Campanya}<br>
            <b>Hectàrees:</b> ${feature.properties.HA}
          `)
        }
      }).addTo(map)
    })
</script>
